name = "ingestion-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "ai-agent-platform"
database_id = "62105372-6230-4a00-b9c0-15d4c24145fd"

[[r2_buckets]]
binding = "R2"
bucket_name = "ai-agent-docs"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "agent-embeddings"
