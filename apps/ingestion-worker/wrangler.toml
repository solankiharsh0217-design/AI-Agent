name = "ingestion-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "ai-agent-platform"
database_id = "placeholder-replace-with-actual-id"

[[r2_buckets]]
binding = "R2"
bucket_name = "ai-agent-documents"

[[queues]]
queue = "ingestion-queue"
binding = "INGESTION_QUEUE"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "ai-agent-vectors"
