name = "api-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://dashboard-deploy-psi-nine.vercel.app,https://widget-deploy-alpha.vercel.app"

[[d1_databases]]
binding = "DB"
database_name = "ai-agent-platform"
database_id = "62105372-6230-4a00-b9c0-15d4c24145fd"

[[kv_namespaces]]
binding = "KV"
id = "b196ec6abd724e71917750b852cd25bd"

[[r2_buckets]]
binding = "R2"
bucket_name = "ai-agent-docs"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "agent-embeddings"

[durable_objects]
bindings = [
  { name = "SESSION_DO", class_name = "SessionDurableObject" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDurableObject"]
