name = "api-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "ai-agent-platform"
database_id = "placeholder-replace-with-actual-id"

[[r2_buckets]]
binding = "R2"
bucket_name = "ai-agent-documents"

[[kv_namespaces]]
binding = "KV"
id = "placeholder-replace-with-actual-id"

[[queues]]
binding = "INGESTION_QUEUE"
queue = "ingestion-queue"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "ai-agent-vectors"

[durable_objects]
bindings = [
  { name = "SESSION_DO", class_name = "SessionDurableObject" }
]

[[migrations]]
tag = "v1"
new_classes = ["SessionDurableObject"]
